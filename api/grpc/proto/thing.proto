syntax = "proto3";

package thing.v1;

// Mirrors the src/shared `Thing` contract — one source of truth.
message Thing {
  string name = 1;
  int32 value = 2;
}

message CreateThingRequest {
  string name = 1;
  int32 value = 2;
}

service ThingService {
  rpc CreateThing(CreateThingRequest) returns (Thing);
}
